
@if (utilityService.notification) {
  <div [class]="utilityService.notification.bgColor"  class=" d-flex flex-column position-absolute w-50 gap-2 pt-2 pb-2 ps-4 pe-4 rounded-3">
      <div class="align-items-center d-flex justify-content-between">
        <div class="align-items-center d-flex gap-2 text-green-700">
        <!-- fa-exclamation-circle -->
        <i [class]="utilityService.notification.iconMessage" class="fa fa-check-circle"></i>
        <p [class]="utilityService.notification.colorMessage" class="fw-bold m-0">{{utilityService.notification.message}}</p>
        </div>
        <div>
          <i  class="fa fa-xmark text-green-700 pointer" (click)="utilityService.ClearNotification()"></i>
        </div>
      </div>
      <div>
        <p [class]="utilityService.notification.colorMessage" class="m-0 text-green-700">{{utilityService.notification.text}}</p>
      </div>
    </div>
}
